<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>상권 활성화 지원 시스템</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; width: 100vw; height: 100dvh; overflow: hidden; overscroll-behavior: none; }
    #app { width: 100vw; height: 100dvh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
    #view-login { position: absolute; inset: 0; background: linear-gradient(160deg, #4c1d95 0%, #5b21b6 50%, #7c3aed 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.5s; }
    .login-card { background: #fff; border-radius: 24px; padding: 28px 24px; width: 80%; max-width: 320px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-btn { width: 100%; background: linear-gradient(135deg, #7c3aed, #8b5cf6); color: #fff; font-weight: 700; padding: 14px; border-radius: 14px; border: none; cursor: pointer; }
    #main-app { display: none; flex-direction: column; width: 100vw; height: 100dvh; }
    .app-header { background: #fff; padding: 52px 20px 14px; border-bottom: 1px solid #f3f0ff; display: flex; justify-content: space-between; align-items: flex-end; }
    .tab-content { flex: 1; overflow-y: auto; background: #f5f3ff; padding-bottom: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 18px; margin: 12px 14px 0; box-shadow: 0 2px 12px rgba(124,58,237,0.08); }
    .hero-card { background: linear-gradient(135deg,#4c1d95 0%,#7c3aed 100%); border-radius: 20px; padding: 22px 20px; margin: 12px 14px 0; color: #fff; }
    .view-section { display: none; }
    .view-section.active { display: block; }
    .bottom-nav { background: #fff; border-top: 1px solid #ede9fe; display: flex; height: 64px; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #9ca3af; cursor: pointer; }
    .nav-item.active { color: #7c3aed; }
    /* 슬라이더 관련 스타일 */
    #slider-container { width:100%; height:200px; border-radius:14px; overflow:hidden; position:relative; background:#ddd; }
    #slider-container img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
    #slider-before { position:absolute; top:0; left:0; width:100%; height:100%; clip-path: inset(0 50% 0 0); z-index:2; pointer-events:none; }
    .slider-line { position:absolute; top:0; left:50%; width:2px; height:100%; background:#fff; z-index:3; pointer-events:none; transform:translateX(-50%); }
    .slider-handle { position:absolute; top:50%; left:50%; z-index:4; transform:translate(-50%,-50%); background:#fff; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 12px rgba(0,0,0,0.3); color:#7c3aed; }
  </style>
</head>
<body>
<div id="app">
  <div id="view-login">
    <div class="login-card">
      <h2>홍석기 센터장</h2>
      <button class="login-btn" onclick="doLogin()">🛡️ 보안 시스템 접속</button>
    </div>
  </div>

  <div id="main-app">
    <div class="app-header">
      <div><div class="header-badge">서구청 마스터 권한</div><h2>홍석기 센터장님 👋</h2></div>
    </div>
    
    <div class="tab-content">
      <div id="tab-dashboard" class="view-section active">
        <div class="hero-card">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="font-size: 11px; color: #c4b5fd;">[시설 개선 + 유동인구 증가 + 상인회 활동도 합산]</div>
            <div style="font-size: 11px; color: #a78bfa;">전월 대비 4.2% 상승</div>
          </div>
          <div class="score">92<span>점</span></div>
        </div>

        <div class="card">
          <div class="card-title">기지국 유동인구 밀집도</div>
          <div style="display:flex; gap:10px;">
            <div style="width:40%; background:#f3f0ff; border-radius:10px; display:flex; align-items:center; justify-content:center;">[서구 126개 상점가 모식도]</div>
            <div style="flex:1;"><canvas id="popChart"></canvas></div>
          </div>
        </div>

        <div class="card">
          <div class="card-title" id="incentive-title">누적 인센티브 및 감점 정산 기록</div>
          <div id="incentive-list"></div>
        </div>
      </div>

      <div id="tab-platform" class="view-section">
        <div id="public-view">
          <div class="card" onclick="openBS()">
            <div style="display:flex; align-items:center; gap:12px;">
              <img src="thumb_video1.png" style="width:60px; height:60px; border-radius:8px;">
              <div><div style="font-weight:700;">봉천동 먹자골목 1번가 상인회 영상</div><div style="font-size:10px;">vid_shop1.mp4</div></div>
            </div>
          </div>
          </div>
      </div>
      </div>
    <div class="bottom-nav">
      <div class="nav-item active" onclick="switchTab('dashboard',this)"><i class="fas fa-chart-line"></i>성과</div>
      <div class="nav-item" onclick="switchTab('platform',this)"><i class="fas fa-database"></i>플랫폼</div>
      <div class="nav-item" onclick="switchTab('ai',this)"><i class="fas fa-robot"></i>AI분석</div>
    </div>
  </div>
</div>

<script>
  function doLogin() {
    document.getElementById('view-login').style.display = 'none';
    document.getElementById('main-app').style.display = 'flex';
  }
  function switchTab(id, el) { /* 탭 전환 로직 */ }
  // 나머지 함수는 이전 코드와 동일하게 유지
</script>
</body>
</html>
